<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הניצחון המוחלט</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for JSX compiling in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: #020617; touch-action: manipulation; }
        @keyframes explode-anim {
          0% { transform: scale(0.5) rotate(-5deg); opacity: 1; }
          70% { transform: scale(1.4) rotate(5deg); opacity: 1; }
          100% { transform: scale(1.5) rotate(10deg); opacity: 0; }
        }
        .animate-explode {
          animation: explode-anim 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // SVG Icons
        const TrophyIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 6 6 10 6 10s6-4 6-10Z"/></svg>
        );
        const LightbulbIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );
        const RefreshIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const ShareIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        );

        const WIDTH = 8;
        const REPO_FOLDER_API = 'https://api.github.com/repos/doriodorio/match3/contents/gameicons';
        const EXPLOSION_GIF_URL = 'https://raw.githubusercontent.com/doriodorio/match3/main/effecticons/transexplosion.gif';
        const FALLBACK_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

        function App() {
            const [board, setBoard] = useState(null);
            const [score, setScore] = useState(0);
            const [sprites, setSprites] = useState([]);
            const [numColors, setNumColors] = useState(6);
            const [loading, setLoading] = useState(true);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [isSwapping, setIsSwapping] = useState(false);
            const [isGameOver, setIsGameOver] = useState(false);
            const [isExploding, setIsExploding] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [imageError, setImageError] = useState(false);
            const [explosions, setExplosions] = useState({});
            const [hintIndices, setHintIndices] = useState(null);

            const loadSpritesFromFolder = useCallback(async () => {
                setLoading(true);
                setImageError(false);
                
                try {
                    const response = await fetch(`${REPO_FOLDER_API}?t=${new Date().getTime()}`);
                    if (!response.ok) throw new Error("Failed to fetch folder from GitHub API");
                    
                    const files = await response.json();
                    const imageFiles = files
                        .filter(f => f.type === 'file' && f.name.match(/\.(png|jpe?g|gif|webp|svg)$/i))
                        .sort((a, b) => a.name.localeCompare(b.name));

                    const loadedSprites = imageFiles.map(f => f.download_url);

                    if (loadedSprites.length >= 3) {
                        setSprites(loadedSprites);
                        setNumColors(loadedSprites.length);
                    } else {
                        console.warn(`Folder only contained ${loadedSprites.length} valid images. Expected at least 3.`);
                        setSprites(FALLBACK_COLORS);
                        setNumColors(FALLBACK_COLORS.length);
                        setImageError(true);
                    }
                } catch (err) {
                    console.error("Error loading from folder:", err);
                    setSprites(FALLBACK_COLORS);
                    setNumColors(FALLBACK_COLORS.length);
                    setImageError(true);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                loadSpritesFromFolder();
            }, [loadSpritesFromFolder]);

            const createBoard = useCallback(() => {
                const newBoard = [];
                for (let i = 0; i < WIDTH * WIDTH; i++) {
                    let randomColor = Math.floor(Math.random() * numColors);
                    let col = i % WIDTH;
                    let row = Math.floor(i / WIDTH);
                    
                    while (
                        (col >= 2 && newBoard[i - 1] === randomColor && newBoard[i - 2] === randomColor) ||
                        (row >= 2 && newBoard[i - WIDTH] === randomColor && newBoard[i - WIDTH * 2] === randomColor)
                    ) {
                        randomColor = Math.floor(Math.random() * numColors);
                    }
                    newBoard.push(randomColor);
                }
                setBoard(newBoard);
                setScore(0);
                setSelectedIdx(null);
                setIsGameOver(false);
                setHintIndices(null);
                setIsExploding(false);
                setExplosions({});
            }, [numColors]);

            useEffect(() => {
                if (!loading && !board) {
                    createBoard();
                }
            }, [loading, board, createBoard]);

            const checkForMatches = (currentBoard) => {
                const matchedIndices = new Set();

                for (let r = 0; r < WIDTH; r++) {
                    for (let c = 0; c < WIDTH - 2; c++) {
                        const i = r * WIDTH + c;
                        if (currentBoard[i] !== null && currentBoard[i] === currentBoard[i + 1] && currentBoard[i] === currentBoard[i + 2]) {
                            matchedIndices.add(i); matchedIndices.add(i + 1); matchedIndices.add(i + 2);
                        }
                    }
                }

                for (let c = 0; c < WIDTH; c++) {
                    for (let r = 0; r < WIDTH - 2; r++) {
                        const i = r * WIDTH + c;
                        if (currentBoard[i] !== null && currentBoard[i] === currentBoard[i + WIDTH] && currentBoard[i] === currentBoard[i + WIDTH * 2]) {
                            matchedIndices.add(i); matchedIndices.add(i + WIDTH); matchedIndices.add(i + WIDTH * 2);
                        }
                    }
                }

                // Flood fill for connected same-color blocks
                const queue = Array.from(matchedIndices);
                while (queue.length > 0) {
                    const idx = queue.shift();
                    const color = currentBoard[idx];
                    if (color === null) continue;

                    const col = idx % WIDTH;
                    const row = Math.floor(idx / WIDTH);
                    const neighbors = [];

                    if (row > 0) neighbors.push(idx - WIDTH);
                    if (row < WIDTH - 1) neighbors.push(idx + WIDTH);
                    if (col > 0) neighbors.push(idx - 1);
                    if (col < WIDTH - 1) neighbors.push(idx + 1);

                    for (const n of neighbors) {
                        if (currentBoard[n] === color && !matchedIndices.has(n)) {
                            matchedIndices.add(n);
                            queue.push(n);
                        }
                    }
                }
                return Array.from(matchedIndices);
            };

            const checkIfMatchesExist = (tempBoard) => {
                for (let r = 0; r < WIDTH; r++) {
                    for (let c = 0; c < WIDTH - 2; c++) {
                        const i = r * WIDTH + c;
                        if (tempBoard[i] !== null && tempBoard[i] === tempBoard[i + 1] && tempBoard[i] === tempBoard[i + 2]) return true;
                    }
                }
                for (let c = 0; c < WIDTH; c++) {
                    for (let r = 0; r < WIDTH - 2; r++) {
                        const i = r * WIDTH + c;
                        if (tempBoard[i] !== null && tempBoard[i] === tempBoard[i + WIDTH] && tempBoard[i] === tempBoard[i + WIDTH * 2]) return true;
                    }
                }
                return false;
            };

            const getAvailableMove = (currentBoard) => {
                for (let i = 0; i < WIDTH * WIDTH; i++) {
                    const col = i % WIDTH;
                    const row = Math.floor(i / WIDTH);

                    if (col < WIDTH - 1) {
                        const temp = [...currentBoard];
                        [temp[i], temp[i + 1]] = [temp[i + 1], temp[i]];
                        if (checkIfMatchesExist(temp)) return [i, i + 1];
                    }
                    if (row < WIDTH - 1) {
                        const temp = [...currentBoard];
                        [temp[i], temp[i + WIDTH]] = [temp[i + WIDTH], temp[i]];
                        if (checkIfMatchesExist(temp)) return [i, i + WIDTH];
                    }
                }
                return null;
            };

            const applyGravity = (currentBoard) => {
                let newBoard = [...currentBoard];
                for (let col = 0; col < WIDTH; col++) {
                    let emptySpaces = 0;
                    for (let row = WIDTH - 1; row >= 0; row--) {
                        let index = row * WIDTH + col;
                        if (newBoard[index] === null) {
                            emptySpaces++;
                        } else if (emptySpaces > 0) {
                            newBoard[index + emptySpaces * WIDTH] = newBoard[index];
                            newBoard[index] = null;
                        }
                    }
                    for (let i = 0; i < emptySpaces; i++) {
                        newBoard[i * WIDTH + col] = Math.floor(Math.random() * numColors);
                    }
                }
                return newBoard;
            };

            useEffect(() => {
                if (!board || isSwapping || isGameOver || isExploding) return;

                const timer = setTimeout(() => {
                    let currentBoard = [...board];
                    let matches = checkForMatches(currentBoard);

                    if (matches.length > 0) {
                        setIsExploding(true);
                        setScore(s => s + matches.length * 10);

                        const newExplosions = {};
                        const timestamp = Date.now();
                        matches.forEach(idx => {
                            newExplosions[idx] = `${EXPLOSION_GIF_URL}?t=${timestamp}-${idx}`; 
                        });
                        setExplosions(prev => ({ ...prev, ...newExplosions }));

                        setTimeout(() => {
                            matches.forEach(idx => currentBoard[idx] = null);
                            setBoard(currentBoard); 

                            setExplosions(prev => {
                                const cleaned = { ...prev };
                                matches.forEach(idx => delete cleaned[idx]);
                                return cleaned;
                            });
                            setIsExploding(false);
                        }, 500); 

                    } else if (currentBoard.includes(null)) {
                        setBoard(applyGravity(currentBoard));
                    } else {
                        const move = getAvailableMove(currentBoard);
                        if (!move) {
                            setIsGameOver(true);
                        }
                    }
                }, 250);

                return () => clearTimeout(timer);
            }, [board, isSwapping, isGameOver, isExploding]);

            const handleSquareClick = (idx) => {
                if (isSwapping || board[idx] === null || isGameOver || isExploding) return;
                setHintIndices(null);

                if (selectedIdx === null) {
                    setSelectedIdx(idx);
                } else {
                    if (selectedIdx === idx) {
                        setSelectedIdx(null); 
                        return;
                    }

                    const isAdjacent = (
                        (idx === selectedIdx - 1 && selectedIdx % WIDTH !== 0) ||
                        (idx === selectedIdx + 1 && selectedIdx % WIDTH !== WIDTH - 1) ||
                        (idx === selectedIdx - WIDTH) ||
                        (idx === selectedIdx + WIDTH)
                    );

                    if (isAdjacent) {
                        swapPieces(selectedIdx, idx);
                    } else {
                        setSelectedIdx(idx);
                    }
                }
            };

            const swapPieces = (idx1, idx2) => {
                setIsSwapping(true);
                setSelectedIdx(null); 
                
                let newBoard = [...board];
                [newBoard[idx1], newBoard[idx2]] = [newBoard[idx2], newBoard[idx1]];
                setBoard(newBoard);

                setTimeout(() => {
                    const matches = checkForMatches(newBoard);
                    if (matches.length === 0) {
                        let revertedBoard = [...newBoard];
                        [revertedBoard[idx1], revertedBoard[idx2]] = [revertedBoard[idx2], revertedBoard[idx1]];
                        setBoard(revertedBoard);
                        setIsSwapping(false);
                    } else {
                        setIsSwapping(false);
                    }
                }, 250);
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'הניצחון המוחלט',
                            text: `I scored ${score} in this Match-3 game! Can you beat it?`,
                            url: window.location.href,
                        });
                    } catch (err) {
                        console.error("Error sharing", err);
                    }
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    setToastMessage("Game link copied to clipboard!");
                    setTimeout(() => setToastMessage(''), 3000);
                }
            };

            const showHint = () => {
                if (isSwapping || isGameOver || isExploding || !board) return;
                const move = getAvailableMove(board);
                if (move) {
                    setHintIndices(move);
                }
            };

            if (loading || !board) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center text-white font-sans">
                        <div className="animate-pulse text-2xl font-bold tracking-widest text-blue-400">
                            LOADING SPRITES...
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center py-10 px-4 font-sans relative">
                    
                    {/* Game Header Image */}
                    <img 
                        src="https://raw.githubusercontent.com/doriodorio/match3/main/more_graphics/gameheader.png" 
                        alt="הניצחון המוחלט" 
                        className="w-full max-w-[420px] sm:max-w-[500px] mb-8 drop-shadow-[0_5px_15px_rgba(0,0,0,0.5)] object-contain"
                    />

                    <div className="w-full max-w-md flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700">
                        <div className="flex flex-col">
                            <span className="text-slate-400 text-xs font-bold uppercase tracking-wider">Score</span>
                            <div className="flex items-center text-white text-3xl font-black">
                                <TrophyIcon className="w-6 h-6 mr-2 text-yellow-500" />
                                {score}
                            </div>
                        </div>
                        
                        <div className="flex space-x-2 sm:space-x-3">
                            <button onClick={showHint} className="p-3 bg-pink-600 hover:bg-pink-500 text-white rounded-xl transition-colors shadow" title="Show Hint">
                                <LightbulbIcon className="w-5 h-5" />
                            </button>
                            <button onClick={createBoard} className="p-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl transition-colors shadow" title="Restart Game">
                                <RefreshIcon className="w-5 h-5" />
                            </button>
                            <button onClick={handleShare} className="p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-colors shadow-blue-900/50 shadow-lg flex items-center" title="Share Game">
                                <ShareIcon className="w-5 h-5 mr-0 sm:mr-2" />
                                <span className="hidden sm:inline font-bold">Share</span>
                            </button>
                        </div>
                    </div>

                    <div className="bg-slate-800 p-3 sm:p-4 rounded-[2rem] shadow-2xl border border-slate-700 relative w-full max-w-[420px] sm:max-w-[500px] overflow-hidden">
                        
                        {isGameOver && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-sm animate-in fade-in duration-500 rounded-[2rem]">
                                <div className="bg-slate-900 border border-slate-700 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_-12px_rgba(0,0,0,1)] flex flex-col items-center text-center mx-4 transform animate-in zoom-in-95 duration-300">
                                    <h2 className="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500 mb-2 drop-shadow-2xl">
                                        GAME OVER
                                    </h2>
                                    <p className="text-slate-300 mb-6 font-semibold uppercase tracking-widest text-sm">No More Moves Left</p>
                                    
                                    <div className="flex flex-col items-center justify-center bg-slate-950/50 p-4 sm:p-6 rounded-2xl border border-slate-800 mb-6 shadow-inner w-full">
                                        <span className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Final Score</span>
                                        <div className="flex items-center text-white text-5xl font-black">
                                            <TrophyIcon className="w-10 h-10 mr-4 text-yellow-500 drop-shadow-lg" />
                                            {score}
                                        </div>
                                    </div>

                                    <button onClick={createBoard} className="flex items-center justify-center px-8 py-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white rounded-2xl font-bold text-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_40px_-10px_rgba(59,130,246,0.5)] border border-blue-400/30 w-full">
                                        <RefreshIcon className="w-6 h-6 mr-3" />
                                        Play Again
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-8 gap-[1px] w-full mx-auto bg-slate-900 border border-slate-700 rounded-lg overflow-hidden p-[1px]">
                            {board.map((item, index) => {
                                const isSelected = selectedIdx === index;
                                const isMatched = item === null;
                                const isHinted = hintIndices && (hintIndices[0] === index || hintIndices[1] === index);
                                
                                const sprite = (item !== null && sprites && sprites.length > item) ? sprites[item] : null;
                                const isColor = sprite && sprite.startsWith('#');
                                const explosion = explosions[index];
                                
                                return (
                                    <div key={index} onClick={() => handleSquareClick(index)} className={`relative w-full aspect-square cursor-pointer`}>
                                        <div
                                            className={`
                                                w-full h-full rounded-sm transition-all duration-200 ease-in-out
                                                ${isMatched ? 'scale-0 opacity-0' : 'scale-100 opacity-100'}
                                                ${isSelected ? 'ring-2 ring-yellow-400 z-10 scale-110 shadow-xl' : isHinted ? 'ring-4 ring-pink-500 animate-pulse z-10 shadow-[0_0_15px_rgba(236,72,153,0.8)]' : 'hover:scale-105 hover:brightness-110 z-0'}
                                                ${!isMatched && !isColor ? 'bg-slate-800' : ''}
                                            `}
                                            style={{
                                                backgroundImage: sprite && !isColor ? `url(${sprite})` : 'none',
                                                backgroundColor: isColor ? sprite : 'transparent',
                                                backgroundSize: '100%',
                                                backgroundPosition: 'center',
                                                backgroundRepeat: 'no-repeat',
                                                boxShadow: isColor ? 'inset 0 -2px 0 rgba(0,0,0,0.2)' : 'none'
                                            }}
                                        />
                                        
                                        {explosion && (
                                            <div className="absolute inset-0 z-20 flex items-center justify-center pointer-events-none animate-explode">
                                                {explosion === 'fallback' ? (
                                                    <span className="text-3xl sm:text-4xl drop-shadow-lg">💥</span>
                                                ) : (
                                                    <div 
                                                        className="w-[150%] h-[150%]"
                                                        style={{
                                                            backgroundImage: `url(${explosion})`,
                                                            backgroundSize: 'contain',
                                                            backgroundPosition: 'center',
                                                            backgroundRepeat: 'no-repeat'
                                                        }}
                                                    />
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className={`
                        fixed bottom-10 px-6 py-3 bg-green-500 text-white font-bold rounded-full shadow-2xl transition-all duration-300 z-50
                        ${toastMessage ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}
                    `}>
                        {toastMessage}
                    </div>

                    <div className="mt-8 text-slate-500 text-sm max-w-md text-center">
                        <p>Tap two adjacent tiles to swap them. Match 3 or more of the same icon to score points.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
